<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.96.1/css/materialize.min.css">

  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.96.1/js/materialize.min.js"></script>

  <title>Weapons</title>
</head>

<body>

<script>
let weaponsData = [];

$(document).ready(function () {
  $('select').material_select();

  // Load JSON file
  $.getJSON("./weapons.json", function (data) {
    weaponsData = data;
    renderTable(data);
  });
});

function renderTable(data) {
  let html = `
    <table class="striped">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Damage</th>
          <th>Rarity</th>
          <th>Affinity</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(w => {
    html += `
      <tr>
        <td>${w.name?.en || "Unknown"}</td>
        <td>${w.type}</td>
        <td>${w.damage}</td>
        <td>${w.rare}</td>
        <td>${w.affinity}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";

  $("#weapon-table").html(html);
}
</script>

<div class="container">

  <!-- FILTER BAR -->
  <div class="row center-align">

    <div class="col s2">
      <p>Filter <i class="mdi-content-filter-list"></i></p>
    </div>

    <div class="input-field col s2">
      <select>
        <option disabled selected>Weapon Type</option>
        <option value="all">All</option>
        <option value="bow">Bow</option>
        <option value="lance">Lance</option>
        <option value="axe">Axe</option>
      </select>
    </div>

    <div class="input-field col s2">
      <select>
        <option disabled selected>Rarity</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>

    <div class="col s2">
      <p>Clear Filter</p>
    </div>

  </div>

</div>

<!-- TABLE AREA -->
<div class="row center-align">

  <div class="col s5">
    <div id="weapon-table">Loading weapons...</div>
  </div>

  <div class="col s7">
    <p>Details panel (future expansion)</p>
  </div>

</div>

</body>
</html>
